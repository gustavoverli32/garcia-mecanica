  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

=\"font-size:11px;font-weight:600;color:#DDD;\">Garcia Admin<\u002Fdiv><div style=\"font-size:9px;color:#555;\">Administrador<\u002Fdiv><\u002Fdiv>\n        <button onclick=\"{{ logout }}\" style=\"background:rgba(239,68,68,.15);border:none;border-radius:6px;padding:4px 8px;color:#F87171;font-size:10px;font-weight:600;cursor:pointer;\">Sair<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- MAIN -->\n  <div style=\"flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;\">\n    <div style=\"background:#fff;border-bottom:1px solid #E5E7EB;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;\">\n      <div><div style=\"font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;color:#111;letter-spacing:.4px;\">{{ pageTitle }}<\u002Fdiv><div style=\"font-size:10px;color:#9CA3AF;margin-top:1px;\">{{ pageSub }}<\u002Fdiv><\u002Fdiv>\n      <div onclick=\"{{ pageAction }}\" style=\"background:#FFC107;border-radius:8px;padding:9px 18px;cursor:pointer;\"><span style=\"font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#000;letter-spacing:.5px;\">{{ pageBtn }}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"main-content\" style=\"flex:1;overflow-y:auto;padding:20px 24px;\">\n      <div style=\"font-size:13px;color:#9CA3AF;text-align:center;padding:40px;\">Carregando...<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- MODALS -->\n<div id=\"modal-bg\" style=\"display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;\">\n  <div id=\"modal-box\" style=\"background:#fff;border-radius:16px;padding:28px;width:90%;max-width:480px;box-shadow:0 24px 60px rgba(0,0,0,.25);animation:fadeIn .2s ease;\"><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- TOAST -->\n<div id=\"toast\" style=\"display:none;position:fixed;bottom:28px;right:28px;z-index:9999;background:#1A1A1A;color:#fff;border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.3);animation:toastIn .3s ease;\"><\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  _PWD = '123456';\n  _URL = 'https://qjdvrqlcblkynheitkuk.supabase.co';\n  _KEY = 'sb_publishable_WtViyZbjpmkjxjP5MFB3mw_-qCQwEXf';\n  _db = null;\n\n  state = {\n    loggedIn: false, loginErr: '', page: 'dashboard',\n    ordens: [], clientes: [], faturamentos: [], despesas: [], funcionarios: [],\n    connected: false, osFilter: 'todos', recFilter: '', depFilter: '',\n  };\n\n  componentDidMount() {\n    if (localStorage.getItem('g_sess') === '1') {\n      this.setState({ loggedIn: true }, () => this._init());\n    }\n    try {\n      const dep = localStorage.getItem('g_dep');\n      if (dep) this.setState({ despesas: JSON.parse(dep) });\n      const func = localStorage.getItem('g_func');\n      if (func) this.setState({ funcionarios: JSON.parse(func) });\n    } catch(e) {}\n  }\n\n  async _init() {\n    try {\n      this._db = window.supabase.createClient(this._URL, this._KEY);\n      await this._load();\n    } catch(e) { console.error(e); }\n  }\n\n  async _load() {\n    try {\n      const [r1, r2, r3] = await Promise.all([\n        this._db.from('ordens').select('*,clientes!inner(nome)').order('id',{ascending:false}),\n        this._db.from('clientes').select('*').order('nome'),\n        this._db.from('faturamentos').select('*,clientes!inner(nome)').order('data',{ascending:false}),\n      ]);\n      this.setState({ ordens: r1.data||[], clientes: r2.data||[], faturamentos: r3.data||[], connected: true });\n    } catch(e) { console.error(e); }\n    /* Despesas — tenta Supabase, cai no localStorage */\n    try {\n      const {data,error}=await this._db.from('despesas').select('*').order('data',{ascending:false});\n      if(!error && data) { this.setState({despesas:data}); localStorage.setItem('g_dep',JSON.stringify(data)); }\n      else throw error;\n    } catch(e) {\n      try { const d=localStorage.getItem('g_dep'); if(d) this.setState({despesas:JSON.parse(d)}); } catch(_){}\n    }\n    /* Funcionários — tenta Supabase, cai no localStorage */\n    try {\n      const {data,error}=await this._db.from('funcionarios').select('*').order('nome');\n      if(!error && data) { this.setState({funcionarios:data}); localStorage.setItem('g_func',JSON.stringify(data)); }\n      else throw error;\n    } catch(e) {\n      try { const f=localStorage.getItem('g_func'); if(f) this.setState({funcionarios:JSON.parse(f)}); } catch(_){}\n    }\n    this._render();\n  }\n\n  doLogin = () => {\n    const v = (document.getElementById('login-senha')?.value||'').trim();\n    if (v === this._PWD) {\n      localStorage.setItem('g_sess','1');\n      this.setState({ loggedIn:true, loginErr:'' }, () => this._init());\n    } else {\n      this.setState({ loginErr:'Senha incorreta. Tente novamente.' });\n      if(document.getElementById('login-senha')) document.getElementById('login-senha').value='';\n    }\n  };\n\n  loginEnter = (e) => { if(e.key==='Enter') this.doLogin(); };\n\n  logout = () => {\n    localStorage.removeItem('g_sess');\n    this.setState({ loggedIn:false, loginErr:'', page:'dashboard' });\n  };\n\n  _nav(p){ return ()=>{ this.setState({page:p},()=>this._render()); }; }\n  _goOS = this._nav('os'); _goCli = this._nav('clientes'); _goRec = this._nav('receitas');\n  _goDep = this._nav('despesas'); _goFin = this._nav('financeiro'); _goDash = this._nav('dashboard');\n\n  _fmt(v){ return 'R$\\u00a0'+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }\n  _mkey(d){ if(!d)return''; const x=new Date(d); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0'); }\n  _dfmt(d){ if(!d)return'—'; return new Date(d+'T12:00:00').toLocaleDateString('pt-BR'); }\n  _stStyle(s){ const m={'Aguardando':'background:#EEF2FF;color:#4338CA','Em Andamento':'background:#FFFBEB;color:#B45309','Aguardando Peça':'background:#FFF7ED;color:#C2410C','Concluída':'background:#ECFDF5;color:#059669','Orçamento':'background:#F5F3FF;color:#6D28D9'}; return (m[s]||'background:#F3F4F6;color:#374151')+';font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;'; }\n  _today(){ return new Date().toISOString().split('T')[0]; }\n\n  /* Parseia serviços e mecânico do campo servico \"Troca de óleo | Freios [Mec: Douglas]\" */\n  _parseSrv(s){ if(!s)return'—'; return s.replace(/\\s*\\[Mec:[^\\]]*\\]/g,'').trim()||'—'; }\n  _parseMec(s){ if(!s)return'—'; const m=s.match(/\\[Mec:\\s*([^\\]]+)\\]/); return m?m[1].trim():'—'; }\n\n  /* Meses para select de filtro */\n  _monthOptions(){\n    const opts=[]; const now=new Date();\n    for(let i=0;i<12;i++){\n      const d=new Date(now.getFullYear(),now.getMonth()-i,1);\n      const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');\n      const label=d.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});\n      opts.push({key,label});\n    }\n    return opts;\n  }\n\n  _toast(msg,ok=true){\n    const el=document.getElementById('toast');\n    if(!el)return;\n    el.textContent=(ok?'✓ ':'✕ ')+msg;\n    el.style.borderLeft='3px solid '+(ok?'#10B981':'#EF4444');\n    el.style.display='block';\n    clearTimeout(this._tTimer);\n    this._tTimer=setTimeout(()=>{el.style.display='none';},3000);\n  }\n\n  _openModal(html){\n    const bg=document.getElementById('modal-bg');\n    const box=document.getElementById('modal-box');\n    if(!bg||!box)return;\n    box.innerHTML=html;\n    bg.style.display='flex';\n    bg.onclick=(e)=>{ if(e.target===bg) this._closeModal(); };\n  }\n  _closeModal(){ const bg=document.getElementById('modal-bg'); if(bg) bg.style.display='none'; }\n\n  _modalOS(){\n    this._openModal(`\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;\">\n        <span style=\"font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#111;\">Nova Ordem de Serviço<\u002Fspan>\n        <button onclick=\"document.getElementById('modal-bg').style.display='none'\" style=\"background:#F3F4F6;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;color:#6B7280;\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:13px;\">\n\n        <div>\n          <div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Telefone do Cliente *<\u002Fdiv>\n          <div style=\"position:relative;\">\n            <input id=\"f-tel-os\" placeholder=\"(22) 99999-9999\" maxlength=\"20\"\n              style=\"width:100%;padding:10px 44px 10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;\"\n              oninput=\"window._garcia._buscaCliente(this.value)\">\n            <div id=\"tel-ico\" style=\"position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"cli-card\" style=\"display:none;margin-top:8px;background:#F0FDF4;border:1.5px solid #10B981;border-radius:8px;padding:10px 13px;align-items:center;gap:10px;\">\n            <div id=\"cli-ini\" style=\"width:32px;height:32px;background:#10B981;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;\">?<\u002Fdiv>\n            <div><div id=\"cli-nome-show\" style=\"font-size:13px;font-weight:700;color:#065F46;\"><\u002Fdiv><div style=\"font-size:10px;color:#6B7280;margin-top:1px;\">Cliente cadastrado ✓<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div id=\"cli-novo\" style=\"display:none;margin-top:8px;background:#FEF3C7;border:1.5px solid #FCD34D;border-radius:8px;padding:10px 13px;\">\n            <div style=\"font-size:11px;font-weight:600;color:#92400E;margin-bottom:8px;\">Número não encontrado — informe o nome:<\u002Fdiv>\n            <input id=\"f-nome-os\" placeholder=\"Nome do cliente *\" style=\"width:100%;padding:8px 10px;border:1.5px solid #FCD34D;border-radius:7px;font-size:12px;background:#fff;\">\n          <\u002Fdiv>\n          <input type=\"hidden\" id=\"f-cli-id\" value=\"\">\n        <\u002Fdiv>\n\n        <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Veículo<\u002Fdiv><input id=\"f-vei\" placeholder=\"Ex: Honda Civic 2020\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;\"><\u002Fdiv>\n        <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Mecânico Responsável<\u002Fdiv><select id=\"f-mec\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;background:#fff;\"><option value=\"\">Selecione o mecânico...<\u002Foption>${this.state.funcionarios.filter(f=>f.cargo==='mecanico').map(f=>`<option value=\"${f.nome}\">${f.nome}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>\n\n        <div>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;\">\n            <div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;\">Serviços *<\u002Fdiv>\n            <button onclick=\"window._garcia._addSrvRow()\" style=\"background:#FFC107;border:none;border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:#000;cursor:pointer;\">+ Serviço<\u002Fbutton>\n          <\u002Fdiv>\n          <div id=\"os-srv-rows\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n          <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Valor Total (R$)<\u002Fdiv><input id=\"f-val\" type=\"number\" placeholder=\"0,00\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;\" oninput=\"\"><\u002Fdiv>\n          <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Status<\u002Fdiv><select id=\"f-st\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;background:#fff;\"><option>Aguardando<\u002Foption><option>Em Andamento<\u002Foption><option>Orçamento<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <button id=\"btn-save-os\" style=\"width:100%;padding:12px;background:#FFC107;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;letter-spacing:1px;margin-top:4px;\">SALVAR OS<\u002Fbutton>\n      <\u002Fdiv>`);\n    document.getElementById('btn-save-os').onclick = () => this._saveOS();\n    this._addSrvRow();\n    this._addSrvRow();\n  }\n\n  _buscaCliente(val){\n    const tel=val.replace(/\\D/g,'');\n    const card=document.getElementById('cli-card');\n    const novo=document.getElementById('cli-novo');\n    const ico=document.getElementById('tel-ico');\n    const idEl=document.getElementById('f-cli-id');\n    if(!card||!novo||!ico||!idEl)return;\n    if(tel.length<7){\n      card.style.display='none'; novo.style.display='none';\n      ico.textContent=''; idEl.value=''; return;\n    }\n    const found=this.state.clientes.find(c=>{\n      const ct=(c.telefone||'').replace(/\\D/g,'');\n      return ct===tel || ct.endsWith(tel) || tel.endsWith(ct);\n    });\n    if(found){\n      card.style.display='flex'; novo.style.display='none';\n      ico.textContent='✓'; ico.style.color='#10B981';\n      document.getElementById('cli-ini').textContent=(found.nome||'?')[0].toUpperCase();\n      document.getElementById('cli-nome-show').textContent=found.nome;\n      idEl.value=found.id;\n    } else {\n      card.style.display='none'; novo.style.display='block';\n      ico.textContent='✕'; ico.style.color='#EF4444';\n      idEl.value='';\n    }\n  }\n\n  _addSrvRow(){\n    const c=document.getElementById('os-srv-rows');if(!c)return;\n    const id='s'+Date.now()+Math.round(Math.random()*9999);\n    const d=document.createElement('div');\n    d.id=id;d.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center;';\n    d.innerHTML=`<input placeholder=\"Descreva o serviço\" style=\"flex:1;padding:9px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:12px;\"><button onclick=\"document.getElementById('${id}').remove()\" style=\"background:#FEF2F2;color:#DC2626;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;font-size:13px;flex-shrink:0;\">✕<\u002Fbutton>`;\n    c.appendChild(d);\n  }\n\n  _getSrvList(){\n    const c=document.getElementById('os-srv-rows');if(!c)return[];\n    return [...c.querySelectorAll('input')].map(i=>i.value.trim()).filter(Boolean);\n  }\n\n  async _saveOS(){\n    const tel=(document.getElementById('f-tel-os')?.value||'').trim();\n    const cliId=document.getElementById('f-cli-id')?.value;\n    const nomeNovo=(document.getElementById('f-nome-os')?.value||'').trim();\n    const vei=(document.getElementById('f-vei')?.value||'').trim();\n    const srvList=this._getSrvList();\n    const mec=document.getElementById('f-mec')?.value||'';\n    const val=parseFloat(document.getElementById('f-val')?.value||0);\n    const st=document.getElementById('f-st')?.value;\n    if(!tel){this._toast('Informe o telefone',false);return;}\n    if(!cliId&&!nomeNovo){this._toast('Informe o nome do cliente',false);return;}\n    if(!vei){this._toast('Preencha o veículo',false);return;}\n    if(srvList.length===0){this._toast('Adicione pelo menos um serviço',false);return;}\n    const now=new Date();\n    const hora=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');\n    const srv=srvList.join(' | ')+(mec?' [Mec: '+mec+']':'');\n    try{\n      let finalCliId=cliId?parseInt(cliId):null;\n      if(!cliId&&nomeNovo){\n        const {error:errCli}=await this._db.from('clientes').insert({nome:nomeNovo,telefone:tel,email:''});\n        if(errCli)throw errCli;\n        const {data:buscaCli,error:errBusca}=await this._db.from('clientes').select('id').eq('telefone',tel).order('id',{ascending:false}).limit(1);\n        if(errBusca)throw errBusca;\n        finalCliId=buscaCli?.[0]?.id||null;\n      }\n      const {error}=await this._db.from('ordens').insert({\n        cliente_id:finalCliId,\n        veiculo:vei,\n        servico:srv,\n        valor:val,\n        status:st,\n        data:this._today(),\n        hora,\n      });\n      if(error)throw error;\n      this._closeModal();\n      this._toast('OS criada!');\n      await this._load();\n    }catch(e){this._toast('Erro: '+e.message,false);}\n  }\n\n  _modalPagamento(osId){\n    const o=this.state.ordens.find(x=>x.id===osId);\n    if(!o)return;\n    const box=document.getElementById('modal-box');\n    if(box){box.style.maxWidth='400px';}\n    this._openModal(`\n      <div style=\"text-align:center;padding:8px 0 16px;\">\n        <div style=\"width:56px;height:56px;background:#ECFDF5;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:26px;\">✓<\u002Fdiv>\n        <div style=\"font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#111;margin-bottom:6px;\">OS #${o.id} Concluída!<\u002Fdiv>\n        <div style=\"font-size:12px;color:#6B7280;margin-bottom:20px;\">${o.clientes?.nome||'Cliente'} · ${o.veiculo||''}<\u002Fdiv>\n        <div style=\"background:#F9FAFB;border-radius:10px;padding:14px;margin-bottom:20px;border:1px solid #F0F0F0;\">\n          <div style=\"font-size:11px;color:#9CA3AF;margin-bottom:4px;\">Valor da OS<\u002Fdiv>\n          <div style=\"font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:#111;\">${this._fmt(o.valor)}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:11px; le=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n        <button onclick=\"window._garcia._printOrcamento()\" style=\"padding:12px;background:#1A1A1A;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#FFC107;cursor:pointer;letter-spacing:.5px;\">🖨️ GERAR PDF<\u002Fbutton>\n        <button onclick=\"window._garcia._whatsappOrcamento()\" style=\"padding:12px;background:#25D366;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.5px;\">📱 WHATSAPP<\u002Fbutton>\n      <\u002Fdiv>`);\n    if(box){box.style.maxWidth='620px';box.style.maxHeight='90vh';box.style.overflowY='auto';}\n    this._addOrcRow('srv',o.servico||'');\n    this._addOrcRow('pec');\n    this._updTotais();\n  }\n\n  _addOrcRow(type,desc=''){\n    const c=document.getElementById(type+'-rows');if(!c)return;\n    const id='r'+Date.now()+Math.round(Math.random()*9999);\n    const d=document.createElement('div');\n    d.id=id;d.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center;';\n    d.innerHTML=`<input value=\"${desc.replace(/\"/g,'&quot;')}\" placeholder=\"${type==='srv'?'Descrição do serviço':'Nome da peça'}\" style=\"flex:1;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:12px;\" oninput=\"window._garcia._updTotais()\"><input type=\"number\" placeholder=\"0,00\" style=\"width:100px;padding:8px 10px;border:1.5px solid #E5E7EB;border-radius:7px;font-size:12px;text-align:right;\" oninput=\"window._garcia._updTotais()\"><button onclick=\"document.getElementById('${id}').remove();window._garcia._updTotais()\" style=\"background:#FEF2F2;color:#DC2626;border:none;border-radius:6px;padding:6px 8px;cursor:pointer;font-size:13px;\">✕<\u002Fbutton>`;\n    c.appendChild(d);\n  }\n\n  _getRows(cid){\n    const c=document.getElementById(cid);if(!c)return{items:[],total:0};\n    const items=[];let total=0;\n    c.querySelectorAll('div[id^=\"r\"]').forEach(row=>{\n      const inp=row.querySelectorAll('input');\n      const desc=(inp[0]?.value||'').trim();const val=parseFloat(inp[1]?.value||0);\n      if(desc){items.push({desc,val});total+=val;}\n    });\n    return{items,total};\n  }\n\n  _updTotais(){\n    const el=document.getElementById('orc-totais');if(!el)return;\n    const s=this._getRows('srv-rows');const p=this._getRows('pec-rows');const g=s.total+p.total;\n    el.innerHTML=`<div style=\"display:flex;flex-direction:column;gap:7px;\">\n      <div style=\"display:flex;justify-content:space-between;font-size:12px;\"><span style=\"color:#6B7280;\">Total Mão de Obra:<\u002Fspan><span style=\"font-weight:700;color:#111;\">${this._fmt(s.total)}<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;font-size:12px;\"><span style=\"color:#6B7280;\">Total Peças:<\u002Fspan><span style=\"font-weight:700;color:#111;\">${this._fmt(p.total)}<\u002Fspan><\u002Fdiv>\n      <div style=\"border-top:2px solid #E5E7EB;padding-top:8px;display:flex;justify-content:space-between;align-items:center;\"><span style=\"font-size:13px;font-weight:700;color:#111;\">TOTAL GERAL:<\u002Fspan><span style=\"font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#FFC107;\">${this._fmt(g)}<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>`;\n  }\n\n  _getOrcData(){\n    const cli=document.getElementById('orc-cli')?.value||'';\n    const tel=document.getElementById('orc-tel')?.value||'';\n    const vei=document.getElementById('orc-vei')?.value||'';\n    const placa=document.getElementById('orc-placa')?.value||'';\n    const s=this._getRows('srv-rows');const p=this._getRows('pec-rows');\n    const pgs=[];\n    if(document.getElementById('pg-din')?.checked)pgs.push('Dinheiro');\n    if(document.getElementById('pg-pix')?.checked)pgs.push('PIX');\n    if(document.getElementById('pg-car')?.checked)pgs.push('Cartão');\n    return{cli,tel,vei,placa,srv:s,pec:p,pgs,grand:s.total+p.total,data:new Date().toLocaleDateString('pt-BR')};\n  }\n\n  _printOrcamento(){\n    const d=this._getOrcData();\n    /* Auto-numeração: incrementa a cada PDF gerado */\n    const numKey='g_orc_num';\n    const num=parseInt(localStorage.getItem(numKey)||'0')+1;\n    localStorage.setItem(numKey,String(num));\n    const numFmt=String(num).padStart(4,'0');\n    const r2=(v)=>'R$ '+v.toFixed(2).replace('.',',');\n    const srvRows=d.srv.items.map(i=>`<tr><td style=\"padding:3px 0\">- ${i.desc}<\u002Ftd><td style=\"padding:3px 0;text-align:right;white-space:nowrap;\">${r2(i.val)}<\u002Ftd><\u002Ftr>`).join('');\n    const pecRows=d.pec.items.map(i=>`<tr><td style=\"padding:3px 0\">- ${i.desc}<\u002Ftd><td style=\"padding:3px 0;text-align:right;white-space:nowrap;\">${r2(i.val)}<\u002Ftd><\u002Ftr>`).join('');\n    const ck=(v,k)=>`${k}&nbsp;(&nbsp;${d.pgs.includes(v)?'X':'&nbsp;'}&nbsp;)`;\n    const html=`<!DOCTYPE html><html lang=\"pt-BR\"><head><meta charset=\"UTF-8\"><title>Orçamento #${numFmt} - Garcia<\u002Ftitle><style>\n      *{box-sizing:border-box}body{font-family:Arial,sans-serif;font-size:13px;color:#000;margin:50px 60px;line-height:1.7}\n      .b{font-weight:bold}table{width:100%}hr{border:none;border-top:2px solid #000;margin:14px 0}\n      .center{text-align:center}.sig-line{border-top:1px solid #000;width:70%;margin:8px auto}\n      .header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #000;padding-bottom:12px;margin-bottom:16px;}\n      .num-box{background:#000;color:#fff;padding:6px 14px;font-weight:bold;font-size:14px;letter-spacing:1px;}\n      @media print{body{margin:30px 40px}}\n    <\u002Fstyle><\u002Fhead><body>\n      <div class=\"header\">\n        <div>\n          <p class=\"b\" style=\"font-size:18px;margin:0;letter-spacing:1px;\">GARCIA AUTOMECÂNICA<\u002Fp>\n          <p style=\"margin:2px 0;font-size:11px;color:#444;\">Campos dos Goytacazes — RJ<\u002Fp>\n          <p style=\"margin:2px 0;font-size:11px;color:#444;\">douglas@garcia.com.br<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align:right;\">\n          <div class=\"num-box\">ORÇAMENTO Nº ${numFmt}<\u002Fdiv>\n          <p style=\"margin:4px 0;font-size:11px;color:#444;\">Data: ${d.data}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p><span class=\"b\">CLIENTE:<\u002Fspan> ${d.cli.toUpperCase()}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"b\">TEL:<\u002Fspan> ${d.tel}<\u002Fp>\n      <p><span class=\"b\">VEÍCULO:<\u002Fspan> ${d.vei.toUpperCase()}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class=\"b\">PLACA:<\u002Fspan> ${d.placa.toUpperCase()}<\u002Fp>\n      <br><p class=\"b\">MÃO DE OBRA:<\u002Fp>\n      <table>${srvRows}<\u002Ftable>\n      <p><span class=\"b\">TOTAL DE MÃO DE OBRA:<\u002Fspan> ${r2(d.srv.total)}<\u002Fp>\n      <br><p class=\"b\">PEÇAS:<\u002Fp>\n      <table>${pecRows}<\u002Ftable>\n      <p><span class=\"b\">TOTAL DE PEÇAS:<\u002Fspan> ${r2(d.pec.total)}<\u002Fp>\n      <br><p><span class=\"b\">TOTAL MÃO DE OBRA + PEÇAS:<\u002Fspan> ${r2(d.grand)}<\u002Fp>\n      <br><p class=\"b\">FORMAS DE PAGAMENTO<\u002Fp>\n      <p>${ck('Dinheiro','DINHEIRO')}&nbsp;&nbsp;&nbsp;${ck('PIX','PIX')}&nbsp;&nbsp;&nbsp;${ck('Cartão','CARTÃO')}<\u002Fp>\n      <br><br>\n      <div class=\"center\">\n        <p>RESPONSÁVEL TÉCNICO (MECÂNICO)<\u002Fp>\n        <div class=\"sig-line\"><\u002Fdiv>\n        <p>DOUGLAS GARCIA FERREIRA<\u002Fp>\n      <\u002Fdiv>\n      <br><br>\n      <div class=\"center\"><p class=\"b\">OBS: TRÊS MESES DE GARANTIA<\u002Fp><p class=\"b\">VALIDO COM A APRESENTAÇÃO DESTA NOTA<\u002Fp><\u002Fdiv>\n    <\u002Fbody><\u002Fhtml>`;\n    const w=window.open('','_blank','width=800,height=900');\n    if(!w){this._toast('Permita pop-ups para gerar o PDF',false);return;}\n    w.document.write(html);w.document.close();\n    w.addEventListener('load',()=>{ setTimeout(()=>w.print(),300); });\n  }\n\n  _whatsappOrcamento(){\n    const d=this._getOrcData();\n    const r2=(v)=>'R$ '+v.toFixed(2).replace('.',',');\n    const srvTxt=d.srv.items.map(i=>`  • ${i.desc}: ${r2(i.val)}`).join('\\n')||'  —';\n    const pecTxt=d.pec.items.map(i=>`  • ${i.desc}: ${r2(i.val)}`).join('\\n')||'  —';\n    const pgTxt=d.pgs.join(' / ')||'A definir';\n    const msg=`🔧 *GARCIA AUTOMECÂNICA*\n━━━━━━━━━━━━━━━━━━━━\n📋 *ORÇAMENTO — ${d.data}*\n\n👤 *Cliente:* ${d.cli}\n🚗 *Veículo:* ${d.vei}${d.placa?' | Placa: '+d.placa:''}\n\n🔩 *MÃO DE OBRA*\n${srvTxt}\n*Subtotal MO: ${r2(d.srv.total)}*\n\n⚙️ *PEÇAS*\n${pecTxt}\n*Subtotal Peças: ${r2(d.pec.total)}*\n\n━━━━━━━━━━━━━━━━━━━━\n💰 *TOTAL GERAL: ${r2(d.grand)}*\n\n💳 *Formas de pagamento:* ${pgTxt}\n\n✅ *Garantia:* 3 meses\n📞 *Contato:* (22) 97400-7557\n\n_Garcia Auto Mecânica — Campos dos Goytacazes RJ_`;\n    const phone=d.tel.replace(/\\D/g,'');\n    window.open('https://wa.me/'+(phone?'55'+phone:'')+'?text='+encodeURIComponent(msg),'_blank');\n  }\n\n  _months6(){\n    const out=[];const now=new Date();\n    for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);out.push({key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),label:d.toLocaleDateString('pt-BR',{month:'short'}).replace('.',''),cur:i===0});}\n    return out;\n  }\n\n  _render(){\n    const el=document.getElementById('main-content');\n    if(!el)return;\n    const {page,ordens,clientes,faturamentos,despesas,osFilter}=this.state;\n    const now=new Date();\n    const curKey=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');\n    const fatM=faturamentos.filter(f=>this._mkey(f.data)===curKey);\n    const depM=despesas.filter(d=>this._mkey(d.data)===curKey);\n    const rec=fatM.reduce((s,f)=>s+parseFloat(f.valor||0),0);\n    const dep=depM.reduce((s,d)=>s+d.valor,0);\n    const lucro=rec-dep;\n    const TH='padding:9px 16px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;';\n    const TD='padding:10px 16px;font-size:12px;';\n    const card=(icon,label,val,sub,color)=>`<div style=\"background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;\"><div style=\"width:42px;height:42px;background:${color}1a;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;\">${icon}<\u002Fdiv><div><div style=\"font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;\">${label}<\u002Fdiv><div style=\"font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:700;color:#111;line-height:1;\">${val}<\u002Fdiv><div style=\"font-size:10px;color:${color};margin-top:3px;\">${sub}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n\n    if(page==='dashboard'){\n      const osAb=ordens.filter(o=>o.status!=='Concluída').length;\n      const osRows=ordens.slice(0,6).map(o=>`<tr style=\"border-bottom:1px solid #F9F9F9;\"><td style=\"${TD}color:#FFC107;font-weight:700;\">#${o.id}<\u002Ftd><td style=\"${TD}color:#374151;font-weight:600;\">${o.clientes?.nome||'—'}<\u002Ftd><td style=\"${TD}color:#9CA3AF;font-size:11px;\">${o.veiculo||'—'}<\u002Ftd><td style=\"${TD}\">${o.servico||'—'}<\u002Ftd><td style=\"${TD}text-align:right;font-weight:700;\">${this._fmt(o.valor)}<\u002Ftd><td style=\"padding:10px 16px;text-align:center;\"><span style=\"${this._stStyle(o.status)}\">${o.status}<\u002Fspan><\u002Ftd><\u002Ftr>`).join('');\n      const m6=this._months6();const maxR=Math.max(...m6.map(m=>faturamentos.filter(f=>this._mkey(f.data)===m.key).reduce((s,f)=>s+parseFloat(f.valor||0),0)),1);\n      const bars=m6.map(m=>{const v=faturamentos.filter(f=>this._mkey(f.data)===m.key).reduce((s,f)=>s+parseFloat(f.valor||0),0);const h=Math.max(Math.round(v/maxR*100),v>0?6:2);return`<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;\"><div style=\"width:100%;flex: :#FFFBEB;color:#92400E;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;'\n        :'background:#EEF2FF;color:#4338CA;font-size:9px;font-weight:700;padding:3px 9px;border-radius:20px;';\n      const cargoLabel=(c)=>c==='mecanico'?'🔧 Mecânico':'🪛 Ajudante';\n      const rows=funcionarios.map(f=>`<tr style=\"border-bottom:1px solid #F9F9F9;\">\n        <td style=\"padding:13px 18px;\">\n          <div style=\"display:flex;align-items:center;gap:10px;\">\n            <div style=\"width:36px;height:36px;background:${f.cargo==='mecanico'?'#FFFBEB':'#EEF2FF'};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;\">${f.cargo==='mecanico'?'🔧':'🪛'}<\u002Fdiv>\n            <div><div style=\"font-size:13px;font-weight:700;color:#374151;\">${f.nome}<\u002Fdiv><div style=\"font-size:10px;color:#9CA3AF;margin-top:1px;\">Desde ${this._dfmt(f.criado)}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Ftd>\n        <td style=\"padding:13px 18px;font-size:12px;color:#6B7280;\">${f.tel||'—'}<\u002Ftd>\n        <td style=\"padding:13px 18px;text-align:center;\"><span style=\"${cargoTag(f.cargo)}\">${cargoLabel(f.cargo)}<\u002Fspan><\u002Ftd>\n        <td style=\"padding:13px 18px;text-align:center;\"><button onclick=\"window._garcia._excluirFunc(${f.id})\" style=\"background:#FEF2F2;color:#DC2626;border:none;border-radius:6px;padding:5px 10px;font-size:10px;font-weight:600;cursor:pointer;\">Remover<\u002Fbutton><\u002Ftd>\n      <\u002Ftr>`).join('');\n      el.innerHTML=`<div style=\"animation:fadeIn .25s ease;\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;\">\n          <div style=\"background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px;\">\n            <div style=\"width:44px;height:44px;background:#FFFBEB;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:2 .filter(f=>this._mkey(f.data)===m.key).reduce((s,f)=>s+parseFloat(f.valor||0),0);const d=despesas.filter(d=>this._mkey(d.data)===m.key).reduce((s,d)=>s+d.valor,0);return Math.max(r,d);}),1);\n      const bars=m6.map(m=>{\n        const r=faturamentos.filter(f=>this._mkey(f.data)===m.key).reduce((s,f)=>s+parseFloat(f.valor||0),0);\n        const d=despesas.filter(dx=>this._mkey(dx.data)===m.key).reduce((s,dx)=>s+dx.valor,0);\n        const rh=Math.max(Math.round(r/maxF*100),r>0?5:2);const dh=Math.max(Math.round(d/maxF*100),d>0?5:2);\n        return`<div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;\"><div style=\"width:100%;flex:1;display:flex;align-items:flex-end;gap:3px;\"><div style=\"flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;\"><div style=\"width:100%;height:${rh}%;background:#10B981;border-radius:3px 3px 0 0;\"><\u002Fdiv><\u002Fdiv><div style=\"flex:1;height:100%;display:flex;flex-direction:column;justify-content:flex-end;\"><div style=\"width:100%;height:${dh}%;background:#EF4444;border-radius:3px 3px 0 0;\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><span style=\"font-size:9px;color:${m.cur?'#FFC107':'#9CA3AF'};font-weight:${m.cur?'700':'400'};\">${m.label}<\u002Fspan><\u002Fdiv>`;\n      }).join('');\n      const tableRows=[...m6].reverse().map(m=>{\n        const r=faturamentos.filter(f=>this._mkey(f.data)===m.key).reduce((s,f)=>s+parseFloat(f.valor||0),0);\n        const d=despesas.filter(dx=>this._mkey(dx.data)===m.key).reduce((s,dx)=>s+dx.valor,0);\n        const l=r-d;const mar=r>0?Math.round(l/r*100):0;\n        return`<tr style=\"border-bottom:1px solid #F9F9F9;\"><td style=\"${TD}font-weight:600;\">${m.label} ${m.key.split('-')[0]}<\u002Ftd><td style=\"${TD}color:#10B981;font-weight:700;text-align:right;\">${this._fmt(r)}<\u002Ftd><td style=\"${TD}color:#EF4444;font-weight:600;text-align:right;\">${this._fmt(d)}<\u002Ftd><td style=\"${TD}text-align:right;\"><span style=\"font-weight:700;color:${l>=0?'#10B981':'#EF4444'};\">${this._fmt(l)}<\u002Fspan><\u002Ftd><td style=\"${TD}color:#9CA3AF;font-size:11px;text-align:right;\">${mar}%<\u002Ftd><\u002Ftr>`;\n      }).join('');\n      const mar=rec>0?Math.round(lucro/rec*100):0;\n      el.innerHTML=`<div style=\"animation:fadeIn .25s ease;\">\n        <div style=\"background:#1A1A1A;border-radius:14px;padding:24px 28px;margin-bottom:16px;\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;\">\n            <div><div style=\"font-size:9px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;\">Resultado — ${now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}<\u002Fdiv><div style=\"font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;color:#FFC107;line-height:1;\">${this._fmt(lucro)}<\u002Fdiv><div style=\"font-size:11px;color:#555;margin-top:6px;\">Receitas: ${this._fmt(rec)} · Despesas: ${this._fmt(dep)}<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:22px;align-items:center;\">\n              <div style=\"text-align:center;\"><div style=\"font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#fff;\">${mar}%<\u002Fdiv><div style=\"font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px;\">Margem<\u002Fdiv><\u002Fdiv>\n              <div style=\"width:1px;height:36px;background:#2A2A2A;\"><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#fff;\">${clientes.length}<\u002Fdiv><div style=\"font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px;\">Clientes<\u002Fdiv><\u002Fdiv>\n              <div style=\"width:1px;height:36px;background:#2A2A2A;\"><\u002Fdiv>\n              <div style=\"text-align:center;\"><div style=\"font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;color:#FFC107;\">${ordens.length}<\u002Fdiv><div style=\"font-size:8px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:4px;\">OS Total<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:20px;margin-bottom:16px;\">\n          <div style=\"font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#111;margin-bottom:4px;\">Receitas × Despesas<\u002Fdiv>\n          <div style=\"font-size:10px;color:#9CA3AF;margin-bottom:18px;\">Comparativo últimos 6 meses<\u002Fdiv>\n          <div style=\"display:flex;align-items:flex-end;gap:12px;height:110px;\">${bars}<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;margin-top:12px;\"><div style=\"display:flex;align-items:center;gap:6px;\"><div style=\"width:10px;height:10px;background:#10B981;border-radius:2px;\"><\u002Fdiv><span style=\"font-size:10px;color:#6B7280;\">Receitas<\u002Fspan><\u002Fdiv><div style=\"display:flex;align-items:center;gap:6px;\"><div style=\"width:10px;height:10px;background:#EF4444;border-radius:2px;\"><\u002Fdiv><span style=\"font-size:10px;color:#6B7280;\">Despesas<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);overflow:hidden;\">\n          <div style=\"padding:13px 18px;border-bottom:1px solid #F3F4F6;\"><span style=\"font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#111;\">Histórico Mensal<\u002Fspan><\u002Fdiv>\n          <table style=\"width:100%;border-collapse:collapse;\"><thead><tr style=\"background:#FAFAFA;\"><th style=\"${TH}\">Mês<\u002Fth><th style=\"${TH}text-align:right\">Receitas<\u002Fth><th style=\"${TH}text-align:right\">Despesas<\u002Fth><th style=\"${TH}text-align:right\">Lucro<\u002Fth><th style=\"${TH}text-align:right\">Margem<\u002Fth><\u002Ftr><\u002Fthead><tbody>${tableRows}<\u002Ftbody><\u002Ftable>\n        <\u002Fdiv><\u002Fdiv>`;\n    }\n  }\n\n  concluirOS(id){ this._modalPagamento(id); }\n\n  _modalFunc(){\n    this._openModal(`\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;\">\n        <span style=\"font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#111;\">Novo Funcionário<\u002Fspan>\n        <button onclick=\"document.getElementById('modal-bg').style.display='none'\" style=\"background:#F3F4F6;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;color:#6B7280;\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:13px;\">\n        <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Nome *<\u002Fdiv><input id=\"fn-nome\" placeholder=\"Nome completo\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;\"><\u002Fdiv>\n        <div><div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;\">Telefone<\u002Fdiv><input id=\"fn-tel\" placeholder=\"(22) 99999-9999\" style=\"width:100%;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:13px;\"><\u002Fdiv>\n        <div>\n          <div style=\"font-size:10px;font-weight:700;color:#374151;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;\">Cargo *<\u002Fdiv>\n          <div style=\"display:flex;gap:10px;\">\n            <label onclick=\"window._garcia._selCargo('mecanico')\" id=\"cargo-mec\" style=\"flex:1;padding:12px;border:2px solid #FFC107;border-radius:10px;background:#FFFBEB;cursor:pointer;text-align:center;\">\n              <div style=\"font-size:20px;margin-bottom:4px;\">🔧<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:700;color:#92400E;\">Mecânico<\u002Fdiv>\n            <\u002Flabel>\n            <label onclick=\"window._garcia._selCargo('ajudante')\" id=\"cargo-aj\" style=\"flex:1;padding:12px;border:2px solid #E5E7EB;border-radius:10px;background:#fff;cursor:pointer;text-align:center;\">\n              <div style=\"font-size:20px;margin-bottom:4px;\">🪛<\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:700;color:#374151;\">Ajudante<\u002Fdiv>\n            <\u002Flabel>\n          <\u002Fdiv>\n          <input type=\"hidden\" id=\"fn-cargo\" value=\"mecanico\">\n        <\u002Fdiv>\n        <button id=\"btn-save-func\" style=\"width:100%;padding:12px;background:#FFC107;border:none;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:#000;cursor:pointer;letter-spacing:1px;\">SALVAR<\u002Fbutton>\n      <\u002Fdiv>`);\n    document.getElementById('btn-save-func').onclick = () => this._saveFunc();\n  }\n\n  _selCargo(cargo){\n    document.getElementById('fn-cargo').value=cargo;\n    const mec=document.getElementById('cargo-mec');\n    const aj=document.getElementById('cargo-aj');\n    if(cargo==='mecanico'){\n      mec.style.borderColor='#FFC107';mec.style.background='#FFFBEB';\n      aj.style.borderColor='#E5E7EB';aj.style.background='#fff';\n    } else {\n      aj.style.borderColor='#818CF8';aj.style.background='#EEF2FF';\n      mec.style.borderColor='#E5E7EB';mec.style.background='#fff';\n    }\n  }\n\n  async _saveFunc(){\n    const nome=document.getElementById('fn-nome')?.value?.trim();\n    const tel=document.getElementById('fn-tel')?.value?.trim();\n    const cargo=document.getElementById('fn-cargo')?.value||'mecanico';\n    if(!nome){this._toast('Nome obrigatório',false);return;}\n    const novo={nome,tel,cargo,ativo:true,criado:this._today()};\n    try {\n      const {data,error}=await this._db.from('funcionarios').insert([novo]).select();\n      if(!error && data?.[0]) { await this._load(); this._closeModal(); this._toast('Funcionário cadastrado!'); return; }\n    } catch(e){}\n    /* fallback localStorage */\n    const func=[...this.state.funcionarios,{id:Date.now(),...novo}];\n    localStorage.setItem('g_func',JSON.stringify(func));\n    this.setState({funcionarios:func},()=>this._render());\n    this._closeModal();this._toast('Funcionário cadastrado!');\n  }\n\n  async _excluirFunc(id){\n    if(!confirm('Remover este funcionário?'))return;\n    try { await this._db.from('funcionarios').delete().eq('id',id); await this._load(); this._toast('Funcionário removido!'); return; } catch(e){}\n    const func=this.state.funcionarios.filter(f=>f.id!==id);\n    localStorage.setItem('g_func',JSON.stringify(func));\n    this.setState({funcionarios:func},()=>this._render());\n    this._toast('Funcionário removido!');\n  }\n  excluirOS(id){ if(!confirm('Excluir esta OS?'))return; this._db.from('ordens').delete().eq('id',id).then(()=>{this._toast('OS excluída!');this._load();}); }\n  /* Observações por cliente — localStorage */\n  _getObs(cid){ try{ const all=JSON.parse(localStorage.getItem('g_obs')||'{}'); return all[cid]||''; }catch(e){return '';} }\n  _saveObs(cid,txt){ try{ const all=JSON.parse(localStorage.getItem('g_obs')||'{}'); all[cid]=txt; localStorage.setItem('g_obs',JSON.stringify(all)); }catch(e){} }\n\n  _modalHistoricoCliente(id){\n    const {ordens,clientes,faturamentos}=this.state;\n    const c=clientes.find(x=>x.id===id);\n    if(!c)return;\n    const cOs=ordens.filter(o=>o.cliente_id===id);\n    const cFat=faturamentos.filter(f=>f.cliente_id===id);\n    const totalGasto=cFat.reduce((s,f)=>s+parseFloat(f.valor||0),0);\n    const obs=this._getObs(id);\n    const box=document.getElementById('modal-box');\n    if(box){box.style.maxWidth='680px';box.style.maxHeight='85vh';box.style.overflowY='auto';}\n    const osRows=cOs.map(o=>`\n      <tr style=\"border-bottom:1px solid #F9F9F9;\">\n        <td style=\"padding:9px 12px;font-size:11px;color:#FFC107;font-weight:700;\">#${o.id}<\u002Ftd>\n        <td style=\"padding:9px 12px;font-size:11px;color:#374151;\">${this._parseSrv(o.servico)}<\u002Ftd>\n        <td style=\"padding:9px 12px;font-size:11px;color:#9CA3AF;\">${o.veiculo||'—'}<\u002Ftd>\n        <td style=\"padding:9px 12px;font-size:11px;color:#9CA3AF;\">${this._dfmt(o.data)}<\u002Ftd>\n        <td style=\"padding:9px 12px;font-size:11px;font-weight:700;text-align:right;\">${this._fmt(o.valor)}<\u002Ftd>\n        <td style=\"padding:9px 12px;text-align:center;\"><span style=\"${this._stStyle(o.status)}\">${o.status}<\u002Fspan><\u002Ftd>\n      <\u002Ftr>`).join('');\n    const fatRows=cFat.map(f=>`\n      <tr style=\"border-bottom:1px solid #F9F9F9;\">\n        <td style=\"padding:8px 12px;font-size:11px;color:#9CA3AF;\">${this._dfmt(f.data)}<\u002Ftd>\n        <td style=\"padding:8px 12px;font-size:11px;color:#6B7280;\">${f.forma||'—'}<\u002Ftd>\n        <td style=\"padding:8px 12px;font-size:12px;font-weight:700;color:#059669;text-align:right;\">${this._fmt(f.valor)}<\u002Ftd>\n        <td style=\"padding:8px 12px;text-align:center;\"><span style=\"background:${f.status==='Pago'?'#ECFDF5':'#FEF3C7'};color:${f.status==='Pago'?'#059669':'#B45309'};font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;\">${f.status}<\u002Fspan><\u002Ftd>\n      <\u002Ftr>`).join('');\n\n    this._openModal(`\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <div style=\"width:48px;height:48px;background:#FFC107;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#000;flex-shrink:0;\">${(c.nome||'?')[0].toUpperCase()}<\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#111;\">${c.nome}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#9CA3AF;margin-top:2px;\">${c.telefone||''} ${c.email?'· '+c.email:''}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"document.getElementById('modal-bg').style.display='none'\" style=\"background:#F3F4F6;border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:18px;color:#6B7280;flex-shrink:0;\">×<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- KPIs do cliente -->\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;\">\n        <div style=\"background:#F9FAFB;border-radius:10px;padding:12px;text-align:center;\">\n          <div style=\"font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;\">Total OS<\u002Fdiv>\n          <div style=\"font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#111;\">${cOs.length}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F9FAFB;border-radius:10px;padding:12px;text-align:center;\">\n          <div style=\"font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;\">Em Aberto<\u002Fdiv>\n          <div style=\"font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#FF8C00;\">${cOs.filter(o=>o.status!=='Concluída').length}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#F9FAFB;border-radius:10px;padding:12px;text-align:center;\">\n          <div style=\"font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;\">Total Gasto<\u002Fdiv>\n          <div style=\"font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#10B981;\">${this._fmt(totalGasto)}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Ordens de Serviço -->\n      <div style=\"margin-bottom:18px;\">\n        <div style=\"font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;\">🔧 Ordens de Serviço<\u002Fdiv>\n        <div style=\"border:1px solid #F3F4F6;border-radius:10px;overflow:hidden;\">\n          <table style=\"width:100%;border-collapse:collapse;\">\n            <thead><tr style=\"background:#FAFAFA;\">\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">OS#<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">Serviço<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">Veículo<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">Data<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:right;letter-spacing:1px;text-transform:uppercase;\">Valor<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:center;letter-spacing:1px;text-transform:uppercase;\">Status<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>${osRows||'<tr><td colspan=\"6\" style=\"padding:16px;text-align:center;color:#9CA3AF;font-size:12px;\">Nenhuma OS registrada<\u002Ftd><\u002Ftr>'}<\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Pagamentos -->\n      <div style=\"margin-bottom:18px;\">\n        <div style=\"font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;\">💳 Pagamentos<\u002Fdiv>\n        <div style=\"border:1px solid #F3F4F6;border-radius:10px;overflow:hidden;\">\n          <table style=\"width:100%;border-collapse:collapse;\">\n            <thead><tr style=\"background:#FAFAFA;\">\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">Data<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:left;letter-spacing:1px;text-transform:uppercase;\">Forma<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:right;letter-spacing:1px;text-transform:uppercase;\">Valor<\u002Fth>\n              <th style=\"padding:8px 12px;font-size:9px;font-weight:700;color:#9CA3AF;text-align:center;letter-spacing:1px;text-transform:uppercase;\">Status<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>${fatRows||'<tr><td colspan=\"4\" style=\"padding:16px;text-align:center;color:#9CA3AF;font-size:12px;\">Nenhum pagamento registrado<\u002Ftd><\u002Ftr>'}<\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Observações -->\n      <div>\n        <div style=\"font-size:10px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;\">📝 Observações<\u002Fdiv>\n        <textarea id=\"cli-obs\" placeholder=\"Adicione observações sobre este cliente: preferências, histórico de problemas, veículos, etc...\" style=\"width:100%;min-height:80px;padding:10px 12px;border:2px solid #E5E7EB;border-radius:8px;font-size:12px;font-family:'Montserrat',sans-serif;resize:vertical;line-height:1.5;\">${obs}<\u002Ftextarea>\n        <button onclick=\"window._garcia._salvarObs(${id})\" style=\"margin-top:8px;padding:9px 18px;background:#FFC107;border:none;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;color:#000;cursor:pointer;letter-spacing:1px;\">SALVAR OBSERVAÇÃO<\u002Fbutton>\n      <\u002Fdiv>`);\n  }\n\n  _salvarObs(cid){\n    const txt=document.getElementById('cli-obs')?.value||'';\n    this._saveObs(cid,txt);\n    this._toast('Observação salva!');\n    this._render();\n  }\n\n  excluirCli(id,nome){ if(!confirm('Excluir '+nome+'?'))return; this._db.from('clientes').delete().eq('id',id).then(()=>{this._toast('Cliente excluído!');this._load();}); }\n  excluirRec(id){ if(!confirm('Excluir este registro?'))return; this._db.from('faturamentos').delete().eq('id',id).then(()=>{this._toast('Registro excluído!');this._load();}); }\n  async excluirDep(id){ if(!confirm('Excluir esta despesa?'))return; try { const {error}=await this._db.from('despesas').delete().eq('id',id); if(!error){await this._load();this._toast('Despesa excluída!');return;} } catch(e){} const dep=this.state.despesas.filter(d=>d.id!==id); localStorage.setItem('g_dep',JSON.stringify(dep)); this.setState({despesas:dep},()=>this._render()); this._toast('Despesa excluída!'); }\n  setFilter(f){ this.setState({osFilter:f},()=>this._render()); }\n  setRecFilter(f){ this.setState({recFilter:f},()=>this._render()); }\n  setDepFilter(f){ this.setState({depFilter:f},()=>this._render()); }\n  goOS(){ this.setState({page:'os'},()=>this._render()); }\n\n  renderVals(){\n    const {loggedIn,loginErr,page,ordens,clientes,connected,osFilter}=this.state;\n    const na=(p)=>({s:`display:flex;align-items:center;gap:10px;padding:9px 12px;${page===p?'background:rgba(255,193,7,.08);border-radius:8px;border-left:3px solid #FFC107;':'border-radius:8px;'}cursor:pointer;`,t:`font-size:${page===p?'13':'12'}px;font-weight:${page===p?'700':'500'};color:${page===p?'#FFC107':'#777'};`});\n    const pages={dashboard:{title:'Dashboard',sub:'Visão geral da oficina',btn:'+ Nova OS',action:()=>this._modalOS()},os:{title:'Ordens de Serviço',sub:ordens.length+' registros',btn:'+ Nova OS',action:()=>this._modalOS()},clientes:{title:'Clientes',sub:clientes.length+' cadastrados',btn:'+ Novo Cliente',action:()=>this._modalCli()},receitas:{title:'Receitas',sub:'Faturamentos registrados',btn:'+ Nova Receita',action:()=>this._modalRec()},despesas:{title:'Despesas',sub:'Lançamentos do período',btn:'+ Nova Despesa',action:()=>this._modalDep()},financeiro:{title:'Financeiro',sub:'Análise financeira completa',btn:'+ Nova Despesa',action:()=>this._modalDep()},funcionarios:{title:'Funcionários',sub:this.state.funcionarios.length+' cadastrados',btn:'+ Novo Funcionário',action:()=>this._modalFunc()}};\n    const pg=pages[page]||pages.dashboard;\n    const osAb=ordens.filter(o=>o.status!=='Concluída').length;\n    const navItems=[\n      {...na('dashboard'),label:'Dashboard',badge:false,badgeVal:'',go:()=>{ this.setState({page:'dashboard'},()=>this._render()); }},\n      {...na('os'),label:'Ordens de Serviço',badge:osAb>0,badgeVal:osAb,go:()=>{ this.setState({page:'os'},()=>this._render()); }},\n      {...na('clientes'),label:'Clientes',badge:false,badgeVal:'',go:()=>{ this.setState({page:'clientes'},()=>this._render()); }},\n      {...na('receitas'),label:'Receitas',badge:false,badgeVal:'',go:()=>{ this.setState({page:'receitas'},()=>this._render()); }},\n      {...na('despesas'),label:'Despesas',badge:false,badgeVal:'',go:()=>{ this.setState({page:'despesas'},()=>this._render()); }},\n      {...na('financeiro'),label:'Financeiro',badge:false,badgeVal:'',go:()=>{ this.setState({page:'financeiro'},()=>this._render()); }},\n      {...na('funcionarios'),label:'Funcionários',badge:false,badgeVal:'',go:()=>{ this.setState({page:'funcionarios'},()=>this._render()); }},\n    ];\n    window._garcia = this;\n    setTimeout(()=>this._render(),0);\n    return {\n      notLoggedIn:!loggedIn, isLoggedIn:loggedIn,\n      showErr:!!loginErr, loginErr, doLogin:this.doLogin, loginEnter:this.loginEnter,\n      logout:this.logout,\n      navItems,\n      connStyle:`font-size:9px;font-weight:700;color:${connected?'#10B981':'#9CA3AF'};`,\n      connText:connected?'● Online — Supabase':'○ Conectando...',\n      pageTitle:pg.title, pageSub:pg.sub, pageBtn:pg.btn, pageAction:pg.action,\n      isDash:page==='dashboard',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
